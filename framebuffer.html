            place-items: center;
            background: #020617;
            color: white;
            font-family: Arial, sans-serif;
        }

        main {
            text-align: center;
        }

        p {
            color: #cbd5e1;
        }

        .tela {
            display: grid;
            grid-template-columns: repeat(24, 28px);
            grid-template-rows: repeat(16, 28px);
            border: 2px solid #374151;
            margin: 24px 0;
        }

        .pixel {
            width: 28px;
            height: 28px;
            box-sizing: border-box;
            border: 1px solid #374151;
            background: #111827;
            transition: background 180ms ease, transform 180ms ease;
        }

        .pixel.aceso {
            transform: scale(0.9);
        }

        button {
            border: 0;
            border-radius: 8px;
            padding: 12px 16px;
            background: #38bdf8;
            color: #052e16;
            cursor: pointer;
            font-weight: bold;
